  triggers:
  - type: BranchUpdateTrigger
    paths: src/
    userMatch: anyone
    paramMatrix:
    - valuesProvider:
        type: SpecifiedValues
        values:
        - - Release
      secret: false
      name: build_configuration
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 3600
- name: CD testing nuget
  steps:
  - type: CheckoutStep
    name: checkout code
    cloneCredential:
      type: DefaultCredential
    withLfs: false
    withSubmodules: false
    cloneDepth: 1
    condition: SUCCESSFUL
    optional: false
  - type: CommandStep
    name: pack SimpleW
    runInContainer: true
    image: mcr.microsoft.com/dotnet/sdk:10.0
    interpreter:
      type: DefaultInterpreter
      commands: |
        cd src/SimpleW
        TS=$(date +"%Y%m%d")-@build_number@
        sed -i -E "s#<Version>([0-9]+\.[0-9]+\.[0-9]+)[^<]*</Version>#<Version>\\1-@param:testing@.${TS}</Version>#g" SimpleW.csproj
        dotnet pack -c Release SimpleW.csproj
    useTTY: false
    condition: SUCCESSFUL
    optional: false
